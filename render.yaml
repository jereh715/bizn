services:
  - type: web
    name: bizn-scraper
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt Flask gunicorn"
    startCommand: "gunicorn main:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
